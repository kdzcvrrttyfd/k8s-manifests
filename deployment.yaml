apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: rlagoddn  # 네임스페이스 수정
  labels:
    app: flask-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: rlaekdh12345/rlagoddn:1
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: database_uri
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: secret_key
            - name: GCS_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: GCS_BUCKET_NAME
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/google-credentials.json"
          volumeMounts:
            - name: google-credentials
              mountPath: "/etc/secrets"
              readOnly: true
          resources:
            requests:
              memory: "250Mi"
              cpu: "210m"
            limits:
              memory: "280Mi"
              cpu: "220m"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 300
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 300
            periodSeconds: 10
      volumes:
        - name: google-credentials
          secret:
            secretName: google-credentials
      dnsPolicy: "ClusterFirst"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app
  namespace: rlagoddn  # 네임스페이스 수정
  labels:
    app: flask-app
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
    cloud.google.com/neg: '{"exposed_ports": {"80":{}}}'
spec:
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer




